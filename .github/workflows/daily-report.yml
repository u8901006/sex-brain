name: Sex Brain Daily Report

on:
  schedule:
    - cron: "0 6 * * *" # UTC 06:00 = 台北時間 14:00
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          fi
          echo "Date: $(cat $GITHUB_OUTPUT | grep target | cut -d= -f2)"

      - name: Fetch papers from PubMed
        run: |
          node scripts/fetch_papers.mjs \
            --days 7 \
            --max-papers 40 \
            --output papers.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('papers.json','utf8')).count||0)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo '{"date":"${{ steps.date.outputs.target }}","count":0,"papers":[]}' > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Deduplicate against last 7 days
        run: node scripts/dedup.mjs

      - name: Update papers count after dedup
        id: dedup
        run: |
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('papers.json','utf8')).count||0)")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Papers after dedup: $COUNT"

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          node scripts/generate_report.mjs \
            --input papers.json \
            --output docs/sex-${{ steps.date.outputs.target }}.html \
            --api-key "$ZHIPU_API_KEY"

      - name: Generate index page
        run: node scripts/generate_index.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📄 sex-brain daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          echo "### 📄 Sex Brain Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.date.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Papers analyzed:** ${{ steps.dedup.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** [sex-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/sex-brain/sex-${{ steps.date.outputs.target }}.html)" >> $GITHUB_STEP_SUMMARY
